<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <!-- Cross-hatch pattern for segment markers -->
    <pattern id="crosshatch" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#555" stroke-width="1" opacity="0.5"/>
    </pattern>
    <!-- Dot pattern for scoring flag -->
    <pattern id="dots" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1.5" fill="#2a7a2a" opacity="0.6"/>
    </pattern>
    <!-- Spiral/ring pattern for review flag -->
    <pattern id="rings" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="3" fill="none" stroke="#b03030" stroke-width="1" opacity="0.55"/>
    </pattern>
    <!-- Arrowhead marker -->
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#333"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#e8e8e8" rx="4"/>

  <!-- Plot area -->
  <rect x="60" y="30" width="680" height="260" fill="#fff" stroke="#bbb" stroke-width="1" rx="2"/>

  <!-- Y-axis label -->
  <text x="18" y="165" font-family="Arial, sans-serif" font-size="11" fill="#444" text-anchor="middle" transform="rotate(-90,18,165)">Acceleration (g)</text>

  <!-- X-axis label -->
  <text x="400" y="308" font-family="Arial, sans-serif" font-size="11" fill="#444" text-anchor="middle">Time (seconds)</text>

  <!-- Y-axis ticks -->
  <text x="55" y="50" font-family="Arial, sans-serif" font-size="9" fill="#666" text-anchor="end">1.5</text>
  <text x="55" y="105" font-family="Arial, sans-serif" font-size="9" fill="#666" text-anchor="end">1.0</text>
  <text x="55" y="165" font-family="Arial, sans-serif" font-size="9" fill="#666" text-anchor="end">0.5</text>
  <text x="55" y="225" font-family="Arial, sans-serif" font-size="9" fill="#666" text-anchor="end">0.0</text>
  <text x="55" y="280" font-family="Arial, sans-serif" font-size="9" fill="#666" text-anchor="end">-0.5</text>

  <!-- Grid lines -->
  <line x1="60" y1="46" x2="740" y2="46" stroke="#eee" stroke-width="0.5"/>
  <line x1="60" y1="101" x2="740" y2="101" stroke="#eee" stroke-width="0.5"/>
  <line x1="60" y1="161" x2="740" y2="161" stroke="#ddd" stroke-width="0.5"/>
  <line x1="60" y1="221" x2="740" y2="221" stroke="#eee" stroke-width="0.5"/>
  <line x1="60" y1="276" x2="740" y2="276" stroke="#eee" stroke-width="0.5"/>

  <!-- EPISODE ANNOTATION: large cyan overlay spanning all 5 reps -->
  <rect x="90" y="35" width="620" height="250" fill="#00bcd4" opacity="0.12" rx="3"/>

  <!-- SEGMENT OVERLAYS (5 reps, cross-hatch) -->
  <!-- Segment 1: ~3-4.5s -->
  <rect x="150" y="55" width="60" height="210" fill="url(#crosshatch)" opacity="0.5" rx="2"/>
  <rect x="150" y="55" width="60" height="210" fill="#00bcd4" opacity="0.08" rx="2"/>
  <!-- Segment 2: ~5.5-7s -->
  <rect x="240" y="55" width="60" height="210" fill="url(#crosshatch)" opacity="0.5" rx="2"/>
  <rect x="240" y="55" width="60" height="210" fill="#00bcd4" opacity="0.08" rx="2"/>
  <!-- Segment 3 (scoring flag): ~8-9.5s -->
  <rect x="330" y="55" width="60" height="210" fill="url(#crosshatch)" opacity="0.5" rx="2"/>
  <rect x="330" y="55" width="60" height="210" fill="url(#dots)" opacity="0.7" rx="2"/>
  <rect x="330" y="55" width="60" height="210" fill="#2a7a2a" opacity="0.08" rx="2"/>
  <!-- Segment 4: ~10.5-12s -->
  <rect x="420" y="55" width="60" height="210" fill="url(#crosshatch)" opacity="0.5" rx="2"/>
  <rect x="420" y="55" width="60" height="210" fill="#00bcd4" opacity="0.08" rx="2"/>
  <!-- Segment 5 (review flag): ~13-14.5s -->
  <rect x="510" y="55" width="60" height="210" fill="url(#crosshatch)" opacity="0.5" rx="2"/>
  <rect x="510" y="55" width="60" height="210" fill="url(#rings)" opacity="0.7" rx="2"/>
  <rect x="510" y="55" width="60" height="210" fill="#b03030" opacity="0.06" rx="2"/>

  <!-- Segment labels along the bottom of the plot -->
  <text x="180" y="280" font-family="Arial, sans-serif" font-size="9" fill="#555" text-anchor="middle">1</text>
  <text x="270" y="280" font-family="Arial, sans-serif" font-size="9" fill="#555" text-anchor="middle">2</text>
  <text x="360" y="280" font-family="Arial, sans-serif" font-size="9" fill="#555" text-anchor="middle">3</text>
  <text x="450" y="280" font-family="Arial, sans-serif" font-size="9" fill="#555" text-anchor="middle">4</text>
  <text x="540" y="280" font-family="Arial, sans-serif" font-size="9" fill="#555" text-anchor="middle">5</text>

  <!-- SIGNAL TRACES -->
  <!-- X-axis signal (dark red #800000) - chair stand with 5 sharp peaks -->
  <polyline fill="none" stroke="#800000" stroke-width="1.8" opacity="0.85" points="
    70,160 80,161 90,160 100,160 110,159
    130,160 140,159 150,140 160,110 170,85 180,120 190,155 200,162
    210,160 220,159 230,160 240,138 250,105 260,80 270,118 280,155 290,162
    300,160 310,159 320,158 330,135 340,100 350,75 360,115 370,152 380,161
    390,160 400,159 410,160 420,137 430,103 440,78 450,117 460,153 470,162
    480,160 490,158 500,159 510,132 520,98 530,72 540,110 550,150 560,161
    570,160 590,161 610,160 630,161 650,160 670,160 690,161 710,160 730,160
  "/>

  <!-- Y-axis signal (teal #7EBEC5) -->
  <polyline fill="none" stroke="#7EBEC5" stroke-width="1.8" opacity="0.85" points="
    70,145 80,146 90,145 100,145 110,144
    130,145 140,144 150,135 160,150 170,175 180,190 190,170 200,148
    210,145 220,144 230,145 240,133 250,152 260,180 270,195 280,172 290,148
    300,145 310,143 320,144 330,130 340,150 350,178 360,198 370,175 380,148
    390,145 400,143 410,145 420,132 430,153 440,182 450,196 460,174 470,148
    480,145 490,143 500,144 510,128 520,148 530,175 540,200 550,178 560,150
    570,145 590,146 610,145 630,146 650,145 670,145 690,146 710,145 730,145
  "/>

  <!-- Z-axis signal (dark gray #58595b) -->
  <polyline fill="none" stroke="#58595b" stroke-width="1.8" opacity="0.85" points="
    70,185 80,186 90,185 100,185 110,184
    130,185 140,184 150,170 160,190 170,215 180,230 190,212 200,190
    210,185 220,184 230,185 240,168 250,192 260,220 270,235 280,214 290,190
    300,185 310,183 320,184 330,165 340,190 350,218 360,238 370,216 380,192
    390,185 400,183 410,185 420,167 430,192 440,222 450,237 460,215 470,192
    480,185 490,182 500,183 510,162 520,188 530,215 540,240 550,218 560,193
    570,185 590,186 610,185 630,186 650,185 670,185 690,186 710,185 730,185
  "/>

  <!-- CALLOUT LABELS WITH ARROWS -->

  <!-- 1. Episode annotation callout -->
  <rect x="62" y="320" width="220" height="22" fill="#fff" stroke="#00838f" stroke-width="1" rx="3" opacity="0.92"/>
  <text x="172" y="335" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#00838f" text-anchor="middle">Episode annotation (Chairstand)</text>
  <line x1="172" y1="320" x2="172" y2="290" stroke="#333" stroke-width="1" marker-end="url(#arrowhead)"/>

  <!-- 2. Segment 1-5 callout -->
  <rect x="280" y="320" width="100" height="22" fill="#fff" stroke="#555" stroke-width="1" rx="3" opacity="0.92"/>
  <text x="330" y="335" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#555" text-anchor="middle">Segments 1-5</text>
  <line x1="330" y1="320" x2="270" y2="275" stroke="#333" stroke-width="1" marker-end="url(#arrowhead)"/>

  <!-- 3. Selected for scoring callout (points to segment 3) -->
  <rect x="375" y="356" width="145" height="22" fill="#fff" stroke="#2a7a2a" stroke-width="1" rx="3" opacity="0.92"/>
  <text x="447" y="371" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2a7a2a" text-anchor="middle">Selected for scoring</text>
  <line x1="420" y1="356" x2="365" y2="270" stroke="#333" stroke-width="1" marker-end="url(#arrowhead)"/>

  <!-- 4. Flagged for review callout (points to segment 5) -->
  <rect x="585" y="320" width="145" height="22" fill="#fff" stroke="#b03030" stroke-width="1" rx="3" opacity="0.92"/>
  <text x="657" y="335" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#b03030" text-anchor="middle">Flagged for review</text>
  <line x1="640" y1="320" x2="545" y2="270" stroke="#333" stroke-width="1" marker-end="url(#arrowhead)"/>

  <!-- LEGEND -->
  <rect x="555" y="36" width="180" height="62" fill="#fff" stroke="#ccc" stroke-width="0.8" rx="3" opacity="0.93"/>
  <line x1="563" y1="52" x2="583" y2="52" stroke="#800000" stroke-width="2"/>
  <text x="588" y="56" font-family="Arial, sans-serif" font-size="10" fill="#444">X-axis</text>
  <line x1="563" y1="68" x2="583" y2="68" stroke="#7EBEC5" stroke-width="2"/>
  <text x="588" y="72" font-family="Arial, sans-serif" font-size="10" fill="#444">Y-axis</text>
  <line x1="563" y1="84" x2="583" y2="84" stroke="#58595b" stroke-width="2"/>
  <text x="588" y="88" font-family="Arial, sans-serif" font-size="10" fill="#444">Z-axis</text>

  <!-- Pattern legend items -->
  <rect x="640" y="44" width="14" height="14" fill="url(#crosshatch)" stroke="#999" stroke-width="0.5"/>
  <text x="658" y="55" font-family="Arial, sans-serif" font-size="9" fill="#444">Segment</text>
  <rect x="640" y="60" width="14" height="14" fill="url(#dots)" stroke="#999" stroke-width="0.5"/>
  <text x="658" y="71" font-family="Arial, sans-serif" font-size="9" fill="#444">Scoring</text>
  <rect x="640" y="76" width="14" height="14" fill="url(#rings)" stroke="#999" stroke-width="0.5"/>
  <text x="658" y="87" font-family="Arial, sans-serif" font-size="9" fill="#444">Review</text>

  <!-- Title -->
  <text x="400" y="20" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">Chair Stand Test — Annotation Workflow</text>
</svg>