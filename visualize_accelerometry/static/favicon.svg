<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" rx="12" fill="#800000"/>

  <!-- Walking figure — shifted left -->
  <g transform="translate(4, 8)">
    <circle cx="12" cy="6" r="4.5" fill="#fff"/>
    <line x1="12" y1="10" x2="12" y2="27" stroke="#fff" stroke-width="2.8" stroke-linecap="round"/>
    <line x1="12" y1="16" x2="5" y2="22" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
    <line x1="12" y1="16" x2="20" y2="13" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
    <line x1="12" y1="27" x2="5" y2="38" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="12" y1="27" x2="21" y2="36" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
  </g>

  <!-- Compact waveform — shifted right for separation -->
  <g transform="translate(32, 14)">
    <path d="M0,18 Q4,18 6,8 T14,6 T22,18 T28,14" fill="none" stroke="#fff" stroke-width="2" opacity="0.95"/>
    <path d="M0,18 Q5,18 8,24 T16,30 T24,18 T28,22" fill="none" stroke="#7EBEC5" stroke-width="2" opacity="0.85"/>
    <!-- Annotation bracket -->
    <rect x="8" y="3" width="12" height="30" rx="2" fill="#7EBEC5" opacity="0.2" stroke="#7EBEC5" stroke-width="0.8"/>
  </g>
</svg>
