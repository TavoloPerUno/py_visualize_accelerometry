# Deploy the Panel demo app to Hugging Face Spaces when a release is published.
#
# Required repository secrets:
#   HF_TOKEN  — A Hugging Face User Access Token with write access.
#               Generate at: https://huggingface.co/settings/tokens
#
# Required repository variables (Settings > Variables > Actions):
#   HF_SPACE  — The full Space name, e.g. "TavoloPerUno/accelerometry-demo"
#               Create the Space first at https://huggingface.co/new-space
#               (choose Docker SDK, blank template).
#
# How it works:
#   1. Checks out the release tag.
#   2. Generates synthetic demo data so the HDF5 files are in the image.
#   3. Uploads the repo to HF Spaces using the huggingface_hub API
#      (avoids git binary file restrictions).

name: Deploy Demo to Hugging Face Spaces

on:
  release:
    types: [published]

  # Allow manual triggers for testing
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pandas numpy tables huggingface_hub bcrypt

      - name: Generate synthetic demo data
        run: python scripts/generate_demo_data.py

      - name: Prepare deployment directory
        run: |
          # Build a clean staging directory with only what HF Spaces needs
          mkdir -p /tmp/hf-space

          # Copy the full project
          rsync -a --exclude='.git' --exclude='__pycache__' \
            --exclude='.github' --exclude='docs/images' \
            . /tmp/hf-space/

          # Dockerfile must be at repo root for HF Spaces
          cp demo/Dockerfile /tmp/hf-space/Dockerfile

          # HF Spaces requires README.md with YAML front-matter at root
          cp demo/README.md /tmp/hf-space/README.md

      - name: Upload to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: ${{ vars.HF_SPACE }}
        run: |
          python -c "
          from huggingface_hub import HfApi
          api = HfApi(token='$HF_TOKEN')
          api.upload_folder(
              folder_path='/tmp/hf-space',
              repo_id='$HF_SPACE',
              repo_type='space',
              commit_message='deploy: update demo app',
          )
          print('Deployed to https://huggingface.co/spaces/$HF_SPACE')
          "
